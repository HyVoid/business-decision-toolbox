name: Sync Tool Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  sync-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rebuild catalog from repository READMEs
        run: python scripts/sync_catalog.py
        env:
          CATALOG_OWNER: ${{ github.repository_owner }}
          CATALOG_REPOSITORY: ${{ github.repository }}
          CATALOG_GITHUB_TOKEN: ${{ secrets.CATALOG_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit catalog changes
        run: |
          if git diff --quiet -- README.md catalog/tool-catalog.csv; then
            echo "No catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog/tool-catalog.csv
          git commit -m "Sync repository catalog"
          git push
